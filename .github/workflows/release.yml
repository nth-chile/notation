name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0-beta.1)'
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            arch: aarch64
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            arch: x86_64
          - platform: ubuntu-22.04
            args: ''
            arch: x86_64
          - platform: windows-latest
            args: ''
            arch: x86_64

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libasound2-dev

      - run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: Nubium ${{ github.event.inputs.tag || github.ref_name }}
          releaseBody: ''
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  updater:
    needs: build
    if: "!cancelled()"
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Sign artifacts and generate latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          REPO="${{ github.repository }}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          BASE="https://github.com/${REPO}/releases/download/${TAG}"

          # Download updatable artifacts from release
          mkdir -p artifacts
          gh release download "$TAG" -R "$REPO" -p "*.app.tar.gz" -D artifacts 2>/dev/null || true
          gh release download "$TAG" -R "$REPO" -p "*.AppImage.tar.gz" -D artifacts 2>/dev/null || true

          echo "Downloaded artifacts:"
          ls -la artifacts/

          # Sign each artifact with the Tauri signing key
          PLATFORMS="{"
          add_platform() {
            local key="$1" file="$2" url="$3"
            if [ -f "artifacts/$file" ]; then
              npx tauri signer sign "artifacts/$file" 2>/dev/null
              if [ -f "artifacts/${file}.sig" ]; then
                SIG=$(cat "artifacts/${file}.sig")
                [ "$PLATFORMS" != "{" ] && PLATFORMS="${PLATFORMS},"
                PLATFORMS="${PLATFORMS}\"${key}\":{\"signature\":\"${SIG}\",\"url\":\"${url}\"}"
                echo "Signed: $key -> $file"
              else
                echo "WARNING: Failed to sign $file"
              fi
            else
              echo "SKIP: $file not found"
            fi
          }

          add_platform "darwin-aarch64" "Nubium_aarch64.app.tar.gz" "${BASE}/Nubium_aarch64.app.tar.gz"
          add_platform "darwin-x86_64" "Nubium_x64.app.tar.gz" "${BASE}/Nubium_x64.app.tar.gz"

          # Find AppImage (version in filename)
          APPIMAGE=$(ls artifacts/*.AppImage.tar.gz 2>/dev/null | head -1)
          if [ -n "$APPIMAGE" ]; then
            APPIMAGE_NAME=$(basename "$APPIMAGE")
            add_platform "linux-x86_64" "$APPIMAGE_NAME" "${BASE}/${APPIMAGE_NAME}"
          fi

          PLATFORMS="${PLATFORMS}}"

          echo "{\"version\":\"${VERSION}\",\"pub_date\":\"${DATE}\",\"platforms\":${PLATFORMS}}" | python3 -m json.tool > latest.json

          echo "Generated latest.json:"
          cat latest.json
          gh release upload "$TAG" latest.json --clobber -R "$REPO"
